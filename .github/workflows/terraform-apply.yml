name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "lambda/**"
      - "helm/**"
      - ".github/workflows/terraform-apply.yml"

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.2

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: |
          terraform plan -input=false -no-color -out=tfplan
          terraform show -json tfplan > tfplan.json

      - name: Reject destructive plans
        run: |
          destructive_count=$(jq '[.resource_changes[]? | select(.change.actions | index("delete"))] | length' tfplan.json)
          if [ "$destructive_count" -gt 0 ]; then
            echo "Plan contains delete actions. Review and apply manually if this is intentional."
            exit 1
          fi

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
